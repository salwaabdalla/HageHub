<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hage Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#4189DD;--blue-dark:#1a5db5;--blue-deeper:#0f3d82;
  --blue-light:#eaf2fd;--blue-mid:#c8dff7;--blue-muted:#6aaae8;
  --white:#ffffff;--bg:#f4f7fb;--bg2:#edf2f9;
  --text:#0c1220;--text-mid:#3d4f6e;--text-soft:#8a9bbf;
  --border:#dce6f5;--radius:14px;--radius-lg:20px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ── TOP NAV (matches screenshot) ── */
.topnav{height:64px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:24px;flex-shrink:0;position:relative;z-index:50}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-right:auto}
.nav-tabs{display:flex;background:var(--bg);border-radius:100px;padding:4px;gap:2px;border:1px solid var(--border)}
.nav-tab{padding:7px 20px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-soft);transition:all .18s;border:none;background:transparent;font-family:'DM Sans',sans-serif;letter-spacing:.1px}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{background:var(--blue);color:#fff;font-weight:600}
.nav-user{display:flex;align-items:center;gap:10px;cursor:pointer;margin-left:24px}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0}
.nav-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.nav-username{font-size:13px;font-weight:600;color:var(--text)}
.nav-notif{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative;transition:all .2s}
.nav-notif:hover{background:var(--blue-light);border-color:var(--blue-mid)}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--blue);border:2px solid var(--white)}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px}
.hamburger span{width:20px;height:2px;background:var(--text);border-radius:2px}

/* ── APP BODY ── */
.app{display:flex;flex-direction:column;height:100vh}
.app-body{flex:1;overflow-y:auto;overflow-x:hidden}
.page{display:none;padding:40px 32px;max-width:1200px;margin:0 auto}
.page.active{display:block}

/* ── DASHBOARD PAGE (matches screenshot layout) ── */
.dash-hero{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 44px 36px;margin-bottom:28px;position:relative;overflow:hidden}
.dash-hero::after{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:var(--blue-light);opacity:.5;pointer-events:none}
.dash-label{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:16px}
.dash-greeting{font-family:'Cormorant Garamond',serif;font-size:clamp(44px,5vw,64px);font-weight:600;color:var(--text);line-height:1.05;margin-bottom:16px}
.dash-greeting span{color:var(--blue)}
.dash-sub{font-size:15px;color:var(--text-mid);line-height:1.65;max-width:520px;margin-bottom:32px}
/* journey progress bar */
.journey-bar{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px}
.journey-bar::-webkit-scrollbar{display:none}
.j-step{display:flex;align-items:center;gap:0;flex-shrink:0}
.j-node{width:90px;height:44px;border-radius:100px;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all .2s;white-space:nowrap;padding:0 18px;position:relative;z-index:1}
.j-node:hover{border-color:var(--blue-mid);color:var(--blue)}
.j-node.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;box-shadow:0 4px 14px rgba(65,137,221,.3)}
.j-node.done{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue-dark)}
.j-line{width:40px;height:1.5px;background:var(--border);flex-shrink:0}
.j-line.done{background:var(--blue-mid)}

/* ── TWO-COLUMN LAYOUT ── */
.dash-cols{display:grid;grid-template-columns:1fr 300px;gap:22px;align-items:start}
.section-eyebrow{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);margin-bottom:10px}
.section-heading{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--text);margin-bottom:18px;line-height:1.15}

/* ── QUESTION CARDS ── */
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.q-card:hover{border-color:var(--blue-mid);box-shadow:0 4px 18px rgba(65,137,221,.08);transform:translateY(-1px)}
.q-card-top{display:flex;gap:14px;align-items:flex-start}
.q-votes{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:28px}
.q-vote-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .2s;color:var(--text-soft)}
.q-vote-btn:hover{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.q-vote-num{font-size:13px;font-weight:700;color:var(--text-mid)}
.q-body{flex:1}
.lang-tag{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.3px;margin-bottom:8px}
.lt-so{background:var(--blue-light);color:var(--blue-dark)}
.lt-en{background:#f0f0ee;color:#666}
.lt-both{background:var(--blue-light);color:var(--blue-dark)}
.q-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:5px}
.q-preview{font-size:13px;color:var(--text-mid);line-height:1.55;margin-bottom:10px}
.q-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.q-tag{padding:3px 10px;background:var(--blue-light);color:var(--blue-dark);border-radius:100px;font-size:11px;font-weight:500}
.q-meta{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text-soft)}
.q-poster-av{width:20px;height:20px;border-radius:50%;background:var(--blue);font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0}
.q-poster-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* ── RIGHT SIDEBAR ── */
.sidebar-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.sc-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);margin-bottom:14px}
.contributor-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.contributor-row:last-child{border-bottom:none}
.contrib-rank{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--text-soft);min-width:20px}
.contrib-av{width:32px;height:32px;border-radius:50%;background:var(--blue);font-size:11px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.contrib-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.contrib-info{flex:1}
.contrib-name{font-size:13px;font-weight:600;color:var(--text)}
.contrib-loc{font-size:11px;color:var(--text-soft)}
.contrib-score{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--blue)}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag-pill{padding:5px 12px;border-radius:100px;background:var(--bg);border:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .2s}
.tag-pill:hover{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}

/* ── AI PAGE ── */
.ai-shell{display:flex;flex-direction:column;height:calc(100vh - 64px - 80px);background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.ai-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.ai-icon{width:40px;height:40px;border-radius:12px;background:var(--blue-deeper);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-hinfo{flex:1}
.ai-hname{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--text)}
.ai-hsub{font-size:12px;color:var(--text-soft)}
.ai-lang-toggle{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px;border:1px solid var(--border)}
.ai-ltb{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-soft);transition:all .2s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.ai-ltb.active{background:var(--blue);color:#fff}
.ai-msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.ai-msgs::-webkit-scrollbar{width:4px}
.ai-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;overflow:hidden;position:relative}
.msg-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ai-msg-av{background:var(--blue-deeper);font-size:16px}
.user-msg-av{background:var(--blue);color:#fff}
.msg-bub{max-width:70%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.6}
.msg.ai .msg-bub{background:var(--bg);border:1px solid var(--border);color:var(--text-mid);border-top-left-radius:4px}
.msg.user .msg-bub{background:var(--blue);color:#fff;border-top-right-radius:4px}
.msg-actions{display:flex;gap:6px;margin-top:7px}
.msg-act-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-soft);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.msg-act-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.msg-translation{margin-top:8px;padding:10px 14px;background:var(--blue-light);border-radius:10px;font-size:12px;color:var(--blue-dark);line-height:1.6;border-left:3px solid var(--blue)}
.msg-translation-label{font-size:9px;font-weight:700;color:var(--blue-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.ai-input-bar{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--white)}
.ai-inp{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;resize:none;max-height:100px;overflow-y:auto;background:var(--bg);transition:all .2s}
.ai-inp:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(65,137,221,.1)}
.ai-send{width:42px;height:42px;border-radius:12px;background:var(--blue);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff;transition:all .2s;flex-shrink:0}
.ai-send:hover{background:var(--blue-dark)}

/* ── CONNECT / MENTOR ── */
.mentor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.mentor-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:all .2s;cursor:pointer}
.mentor-card:hover{border-color:var(--blue-mid);box-shadow:0 8px 24px rgba(65,137,221,.1);transform:translateY(-2px)}
.mc-av{width:54px;height:54px;border-radius:50%;background:var(--blue);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:14px;overflow:hidden;position:relative}
.mc-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.mc-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.mc-role{font-size:12px;color:var(--text-soft);margin-bottom:10px}
.mc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.mc-tag{padding:3px 9px;background:var(--blue-light);color:var(--blue-dark);border-radius:100px;font-size:10px;font-weight:600}
.mc-loc{font-size:11px;color:var(--text-soft);margin-bottom:14px}
.mc-btn{width:100%;padding:9px;background:transparent;border:1.5px solid var(--blue-mid);border-radius:100px;font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.mc-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.cohort-banner{background:var(--blue-deeper);border-radius:var(--radius);padding:22px 26px;color:#fff;margin-bottom:20px}
.cohort-banner h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;margin-bottom:4px}
.cohort-banner p{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:14px}
.cohort-prog{background:rgba(255,255,255,.12);border-radius:100px;height:6px}
.cohort-prog-bar{background:var(--blue-muted);border-radius:100px;height:100%;transition:width .5s}
.cohort-weeks{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px}

/* ── WORK / JOBS ── */
.job-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;display:flex;gap:16px;align-items:center;cursor:pointer;transition:all .2s}
.job-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(65,137,221,.08);transform:translateX(3px)}
.jc-logo{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;flex-shrink:0}
.jc-info{flex:1}
.jc-title{font-weight:600;font-size:14px;color:var(--text);margin-bottom:3px}
.jc-meta{font-size:12px;color:var(--text-soft);margin-bottom:6px}
.jc-tags{display:flex;gap:6px;flex-wrap:wrap}
.jc-tag{padding:3px 10px;border-radius:100px;font-size:10px;font-weight:600}
.jt-ft{background:#e8f5ee;color:#1a6b4a}
.jt-int{background:var(--blue-light);color:var(--blue-dark)}
.jt-rem{background:#f3f0ff;color:#5b3fa0}
.jt-som{background:#fff3e0;color:#a06010}
.jc-arrow{font-size:16px;color:var(--text-soft);transition:all .2s}
.job-card:hover .jc-arrow{color:var(--blue);transform:translateX(3px)}

/* ── STORIES ── */
.stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.story-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
.story-card:hover{border-color:var(--blue-mid);box-shadow:0 8px 24px rgba(65,137,221,.1);transform:translateY(-2px)}
.story-cover{height:130px;display:flex;align-items:flex-end;padding:14px;position:relative;overflow:hidden}
.story-cover-bg{position:absolute;inset:0;opacity:.08;font-family:'Cormorant Garamond',serif;font-size:110px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;line-height:1}
.story-cat{position:relative;z-index:1;padding:4px 12px;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border-radius:100px;font-size:10px;font-weight:600;color:#fff;letter-spacing:.8px;text-transform:uppercase}
.story-body{padding:16px}
.story-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:6px}
.story-excerpt{font-size:12px;color:var(--text-mid);line-height:1.55;margin-bottom:12px}
.story-author{display:flex;align-items:center;gap:7px}
.story-av{width:24px;height:24px;border-radius:50%;background:var(--blue-light);font-size:9px;font-weight:700;color:var(--blue-dark);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0}
.story-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.story-name{font-size:12px;font-weight:600;color:var(--text-mid)}
.story-date{margin-left:auto;font-size:11px;color:var(--text-soft)}

/* ── THREAD VIEW ── */
.thread-wrap{max-width:760px}
.thread-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-soft);cursor:pointer;margin-bottom:20px;transition:color .2s}
.thread-back:hover{color:var(--blue)}
.thread-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:10px}
.thread-meta{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.ai-block{background:var(--blue-deeper);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.ai-block-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-block-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-muted)}
.ai-block-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue-muted)}
.ai-block-body{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7}
.ai-block-langs{display:flex;gap:7px;margin-top:12px}
.abl-btn{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.abl-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.abl-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.ai-comments{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.ai-comm-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px}
.ai-comm-item{display:flex;gap:8px;margin-bottom:9px}
.ai-comm-av{width:24px;height:24px;border-radius:50%;background:var(--blue-mid);font-size:9px;font-weight:600;color:var(--blue-darker,#0f3d82);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.ai-comm-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ai-comm-bubble{background:rgba(255,255,255,.06);border-radius:10px;padding:7px 11px;flex:1}
.ai-comm-name{font-size:10px;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:2px}
.ai-comm-text{font-size:12px;color:rgba(255,255,255,.55);line-height:1.5}
.comm-input-row{display:flex;gap:7px;margin-top:8px}
.comm-inp{flex:1;padding:8px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;font-size:12px;color:#fff;font-family:'DM Sans',sans-serif;outline:none}
.comm-inp::placeholder{color:rgba(255,255,255,.25)}
.comm-send{padding:8px 14px;background:var(--blue);border:none;border-radius:9px;font-size:11px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif}
.answer-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.answer-card.accepted{border-color:var(--blue);background:var(--blue-light)}
.accepted-pill{display:inline-flex;align-items:center;gap:5px;background:var(--blue);color:#fff;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;margin-bottom:10px}
.ans-author{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ans-av{width:32px;height:32px;border-radius:50%;background:var(--blue);font-size:11px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0}
.ans-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ans-text{font-size:13px;color:var(--text-mid);line-height:1.7;margin-bottom:12px}
.ans-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ── TABS ── */

/* ── MODE TOGGLE ── */
.mode-toggle-wrap{position:fixed;bottom:24px;right:24px;background:var(--white);border:1px solid var(--border);border-radius:100px;padding:4px;display:flex;gap:2px;box-shadow:0 4px 18px rgba(0,0,0,.1);z-index:90}
.mode-tog-btn{padding:8px 18px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-soft);transition:all .2s;border:none;background:transparent;font-family:'DM Sans',sans-serif}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}

/* ── SETTINGS ── */

.toggle-track.off .toggle-thumb{right:auto;left:3px}

<!-- MODAL: Ask Question -->

<script>
// ── STATE ──
let mode = 'student';
let currentPage = 'dashboard';
let aiLang = 'en';
let activeThread = null;
let userPhoto = localStorage.getItem('hh_photo') || null;
let userName = localStorage.getItem('hh_name') || 'salwa';
let questions = JSON.parse(localStorage.getItem('hh_questions') || 'null') || getDefaultQuestions();
let aiMessages = [];

function getDefaultQuestions() {
  return [
    {id:'q1',lang:'so',title:'Maxaa loo isticmaalaa recursion-ka?',body:'Waxaan baranayaa Python. Recursion-ka ma fahmi karo. Tusaale ii sii.',tags:['algorithms','python'],votes:14,answers:3,poster:{init:'FA',name:'Faadumo A.',loc:'Mogadishu'},time:'2h ago'},
    {id:'q2',lang:'en',title:'How do I choose between React and Next.js for my first project?',body:"I'm a beginner unsure which framework to start with. What are the real tradeoffs?",tags:['react','web-dev'],votes:9,answers:7,poster:{init:'MH',name:'Mohamed H.',loc:'Minneapolis'},time:'4h ago'},
    {id:'q3',lang:'both',title:'What is an API? / API-ka waa maxay?',body:'Can someone explain APIs in both languages? Somali explanation would really help.',tags:['api','fundamentals'],votes:21,answers:5,poster:{init:'HA',name:'Halimo A.',loc:'London'},time:'Yesterday'},
    {id:'q4',lang:'en',title:'Best resources for learning system design as a Somali dev?',body:'Looking for resources that consider limited bandwidth and different tech contexts.',tags:['system-design','resources'],votes:16,answers:4,poster:{init:'YN',name:'Yusuf N.',loc:'Hargeisa'},time:'2 days ago'},
  ];
}

// ── SOMALI TRANSLATIONS (authentic af Soomaali) ──
const soTranslations = {
  recursion:`Recursion waa hab ay function-ku isu wacdo si ay u xalliso dhibaato yar oo ka mid ah dhibaatada weyn. Laba shay ayaa muhiim ah: (1) xaaladda asaasiga — marka la joojinayo, (2) xaaladda ku-celcelinta — marka dhibaatada la yareynayo. Tusaale ahaan, factorial-ka 5 waa: 5 × factorial(4) → 4 × factorial(3) → ... ilaa ay gaarto 1.`,
  react:`React waa maktabad JavaScript ah oo loo isticmaalo dhismaha xaas-abuurka (user interface). Waxay isticmaashaa qaybaha yaryar ee "components" la isku darsado si loogu sameeyo bogag web ah. Waxaa lagu abuuray shirkadda Meta (hore Facebook). Next.js waa framework-ka ku dhisan React-ka oo bixiya features dheeraad ah sida server-side rendering.`,
  api:`API (Application Programming Interface) waa xiriirka u dhexeeya laba barnaamij. Sidaad u mooddo "khamiis" gebi — waxaad u dirsataa codsiga, waxaad ka hesho jawaabta, laakiin ma garanayso sida shaqada gudaha loo sameeyay. Tusaale: markaad isticmaasho app-ka cimriga, waxay isticmaashaa API weather-ka si ay uga hesho xogta.`,
  default:`Su'aashaada waa mid waxtar leh. Si aan si fiican ugu jawaabo, fadlan ii sii faahfaahin dheeraad ah. Waxaan kaa caawin karaa arrimaha teknoolojiyada, barnaamijyada, iyo cilmiga kombiyuutarka af Soomaali.`
};

function getSomaliResp(text) {
  const t = text.toLowerCase();
  if(t.includes('recursion')) return soTranslations.recursion;
  if(t.includes('react') || t.includes('next')) return soTranslations.react;
  if(t.includes('api')) return soTranslations.api;
  return soTranslations.default;
}
function getEnglishResp(text) {
  const resps = [
    `Great question! This is a core concept every developer needs to understand. Let me break it down step by step with a practical example you can apply right away in your projects.`,
    `This comes up a lot in the Somali dev community. The key insight is understanding the underlying pattern first — once it clicks, everything else falls into place. Here's how I'd explain it...`,
    `Think of it this way: every complex system is made of simple, repeatable parts. This concept follows that same principle. The analogy that makes it click for most people is...`,
  ];
  return resps[Math.floor(Math.random()*resps.length)];
}

// ── PAGES ──
function renderDashboard() {
  const journeyStep = mode === 'student' ? 1 : 3;
  const steps = ['Start','Learn','Ask','Connect','Build','Get Hired'];
  const firstName = userName.charAt(0).toUpperCase() + userName.slice(1);
  return `<div class="page active" id="pageDashboard">
    <div class="dash-hero">
      <div class="dash-label">Dashboard</div>
      <div class="dash-greeting">Asc, <span>${firstName}</span></div>
      <div class="dash-sub">Your next step in Hage Hub is shaped by what you want to learn, answer, and build with the community.</div>
      <div class="journey-bar">
        ${steps.map((s,i)=>`
          ${i>0?`<div class="j-line${i<=journeyStep?' done':''}"></div>`:''}
          <div class="j-node${i===journeyStep?' active':i<journeyStep?' done':''}" onclick="journeyClick(${i})">${s}</div>
        `).join('')}
      </div>
    </div>
    <div class="dash-cols">
      <div>
        <div class="section-eyebrow">Recent Questions</div>
        <div class="section-heading">Keep the conversation moving</div>
        <button class="ask-fab" onclick="openModal('askModal')">+ Ask a Question</button>
        ${renderQuestionCards(questions.slice(0,4))}
      </div>
      <div>
        <div class="sidebar-card">
          <div class="sc-title">Top Contributors</div>
          ${[
            {rank:1,init:'HM',name:'Hodan Mire',loc:'Doha',score:980,bg:'var(--blue)'},
            {rank:2,init:'AA',name:'Abdi Axmed',loc:'San Francisco',score:847,bg:'#1a5db5'},
            {rank:3,init:'YI',name:'Yusuf Ibraahim',loc:'Toronto',score:723,bg:'#0f3d82'},
            {rank:4,init:'FN',name:'Faadumo Nuur',loc:'Seattle',score:611,bg:'#6aaae8'},
          ].map(c=>`
          <div class="contributor-row">
            <div class="contrib-rank">${c.rank}.</div>
            <div class="contrib-av" style="background:${c.bg}">${c.init}</div>
            <div class="contrib-info"><div class="contrib-name">${c.name}</div><div class="contrib-loc">${c.loc}</div></div>
            <div class="contrib-score">${c.score}</div>
          </div>`).join('')}
        </div>
        <div class="sidebar-card">
          <div class="sc-title">Popular Tags</div>
          <div class="tag-cloud">
            ${['algorithms','python','react','web-dev','ai/ml','data-structures','javascript','interview-prep','somalia-tech','system-design'].map(t=>`<div class="tag-pill">${t}</div>`).join('')}
          </div>
        </div>
        ${mode==='student'?`
        <div class="sidebar-card" style="background:var(--blue-deeper);border-color:transparent">
          <div class="sc-title" style="color:rgba(255,255,255,.4)">My Cohort</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:#fff;margin-bottom:4px">Abdi Axmed · Mentor</div>

        {bg:'#6aaae8',init:'FN',sInit:'F',name:'Faadumo Nuur',date:'Dec 2023',title:'Why I turned down a $200k offer to work on Somali AI',excerpt:'The most important work I could do with my ML skills is not at a big tech company. It\'s here.',cat:'AI / ML'},
      ].map(s=>`
      <div class="story-card">
        <div class="story-cover" style="background:${s.bg}">
          <div class="story-cover-bg">${s.sInit}</div>
          <span class="story-cat">${s.cat}</span>
        </div>
        <div class="story-body">
          <div class="story-title">${s.title}</div>
          <div class="story-excerpt">${s.excerpt}</div>
          <div class="story-author">
            <div class="story-av">${s.init}</div>
            <span class="story-name">${s.name}</span>
            <span class="story-date">${s.date}</span>
          </div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

  const firstName = userName.charAt(0).toUpperCase() + userName.slice(1);
  return `<div class="page active" id="pageProfile">
    <div class="profile-hero">
      <div class="profile-av-wrap">
        <div class="profile-av" id="profileAvEl">${firstName.substring(0,2).toUpperCase()}<img id="profileAvImg" src="${userPhoto||''}" style="${userPhoto?'':'display:none'}"></div>
        <div class="profile-cam" onclick="document.getElementById('profilePhotoInp').click()" title="Change photo">📷</div>
        <input type="file" id="profilePhotoInp" accept="image/*" style="display:none" onchange="updatePhoto(this)">
      </div>
      <div class="profile-info">
        <div class="profile-name" id="profileNameEl">${firstName}</div>
        <div class="profile-role-badge">${mode==='student'?'Student · Somali Tech Community':'Mentor · Senior SWE'}</div>
        <div class="profile-bio">${mode==='student'?'CS student passionate about building technology for Somalia. Currently learning full-stack development and exploring AI.':'Senior Software Engineer passionate about giving back to the Somali tech community. Mentor at Hage Hub.'}</div>
        <div class="profile-chips">
          ${(mode==='student'?['Student','Mogadishu','7 Questions','3 Answers']:['Mentor','Google SWE','San Francisco','124 Answers']).map(b=>`<span class="profile-chip">${b}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab(this,'ptp','pActivity')">Activity</button>
      <button class="tab-btn" onclick="switchTab(this,'ptp','pQuestions')">Questions</button>
      <button class="tab-btn" onclick="switchTab(this,'ptp','pEdit')">Edit Profile</button>
    </div>
    <div id="pActivity" class="tab-panel active">
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
        ${[
          {t:'Asked: Maxaa loo isticmaalaa recursion-ka?',time:'2h ago'},
          {t:'Answered: How do I use useEffect correctly?',time:'Yesterday'},
          {t:'Joined mentorship cohort with Abdi Axmed',time:'3 days ago'},
          {t:'AI translated your question to Somali',time:'4 days ago'},
        ].map(a=>`<div style="display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)"><div style="width:7px;height:7px;border-radius:50%;background:var(--blue);margin-top:5px;flex-shrink:0"></div><div><div style="font-size:13px;color:var(--text-mid)">${a.t}</div><div style="font-size:11px;color:var(--text-soft);margin-top:2px">${a.time}</div></div></div>`).join('')}
      </div>
    </div>
    <div id="pQuestions" class="tab-panel">${renderQuestionCards(questions.slice(0,2))}</div>
    <div id="pEdit" class="tab-panel">
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px">
        <div class="form-group"><label class="form-label">Display Name</label><input class="form-input" id="editName" value="${firstName}" oninput="previewName(this.value)"></div>
        <div class="form-group"><label class="form-label">Bio</label><textarea class="form-textarea">${mode==='student'?'CS student passionate about building technology for Somalia.':'Senior Software Engineer passionate about giving back to the Somali tech community.'}</textarea></div>
        <div class="form-group"><label class="form-label">Location</label><input class="form-input" value="${mode==='student'?'Mogadishu, Somalia':'San Francisco, CA'}"></div>
        <div class="form-group"><label class="form-label">Skills</label><input class="form-input" value="${mode==='student'?'Python, HTML, CSS':'JavaScript, React, System Design, Go'}"></div>
        <div class="form-group">
          <label class="form-label">Profile Photo</label>
          <div class="upload-zone" onclick="document.getElementById('editPhotoInp').click()">
            <div style="font-size:22px">📷</div><p>Click to upload a new profile photo</p>
            <input type="file" id="editPhotoInp" accept="image/*" style="display:none" onchange="updatePhoto(this)">
          </div>
        </div>
        <div class="btn-row"><button class="btn-primary" onclick="saveName()">Save Changes</button></div>
      </div>
    </div>
  </div>`;
}

function renderSettings() {
  return `<div class="page active" id="pageSettings">
    <div style="max-width:560px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:22px">Settings</div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:14px">Notifications</div>
        ${['New answers on my questions','New mentor requests','Job alerts','Community digest','AI translations ready'].map(s=>`
        <div class="toggle-row"><span class="toggle-label">${s}</span><div class="toggle-track" onclick="this.classList.toggle('off')"><div class="toggle-thumb"></div></div></div>`).join('')}
      </div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
        <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:14px">Language</div>
        <div class="form-group"><label class="form-label">Default AI response language</label>
          <select class="form-input"><option>Both (English + Somali)</option><option>English only</option><option>Somali only</option></select>
        </div>
        <div class="form-group"><label class="form-label">Interface language</label>
          <select class="form-input"><option>English</option><option>Somali (af Soomaali)</option></select>
        </div>
        <div class="btn-row"><button class="btn-primary" onclick="showToast('Settings saved!')">Save</button></div>
      </div>
    </div>
  </div>`;
}

// ── INTERACTIONS ──
function showPage(page, tabEl) {
  currentPage = page;
  if(tabEl) {
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    tabEl.classList.add('active');
  }
  const content = document.getElementById('mainContent');
  const pages = {
    dashboard: renderDashboard,
    knowledge: renderKnowledge,
    ai: renderAI,
    connect: renderConnect,
    work: renderWork,
    stories: renderStories,
    profile: renderProfile,
    settings: renderSettings,
  };
  content.innerHTML = (pages[page]||renderDashboard)();
  document.querySelector('.app-body').scrollTop = 0;
}

function openThread(qid) {
  activeThread = qid;
  document.getElementById('mainContent').innerHTML = renderThread(qid);
}

function switchTab(btn, group, panelId) {
  const row = btn.closest('.tab-row');
  row.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>{
    if(p.id && [panelId].includes(p.id)) p.classList.add('active');
    else if(p.closest(`#${document.getElementById(panelId)?.parentElement?.id}`)) p.classList.remove('active');
  });
  document.getElementById(panelId)?.classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function pickLang(el) {
  el.parentElement.querySelectorAll('.lang-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

function submitQuestion() {
  const title = document.getElementById('qTitle')?.value.trim();
  if(!title) { showToast('Please add a title'); return; }
  const q = {
    id: 'q'+Date.now(),
    lang: document.querySelector('.lang-opt.sel')?.textContent.includes('Somali')?'so':document.querySelector('.lang-opt.sel')?.textContent.includes('Both')?'both':'en',
    title,
    body: document.getElementById('qBody')?.value || '',
    tags: (document.getElementById('qTags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean),
    votes:0, answers:0,
    poster:{init:userName.substring(0,2).toUpperCase(),name:userName,loc:''},
    time:'Just now'
  };
  questions.unshift(q);
  localStorage.setItem('hh_questions', JSON.stringify(questions));
  closeModal('askModal');
  showToast('Question posted!');
  setTimeout(()=>showPage(currentPage, null), 300);
}

function vote(qid, val, btn) {
  const q = questions.find(x=>x.id===qid);
  if(!q) return;
  q.votes += val;
  localStorage.setItem('hh_questions', JSON.stringify(questions));
  const el = document.getElementById('votes-'+qid);
  if(el) el.textContent = q.votes;
}

function previewUploads(input, previewId) {
  const preview = document.getElementById(previewId);
  if(!preview) return;
  Array.from(input.files).forEach(file=>{
    const r = new FileReader();
    r.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'upload-thumb';
      preview.appendChild(img);
    };
    r.readAsDataURL(file);
  });
}

function updatePhoto(input) {
  if(!input.files[0]) return;
  const r = new FileReader();
  r.onload = e => {
    userPhoto = e.target.result;
    localStorage.setItem('hh_photo', userPhoto);
    // Update everywhere
    const ids = ['navAvatarImg','profileAvImg'];
    ids.forEach(id=>{ const el=document.getElementById(id); if(el){el.src=userPhoto;el.style.display='block';} });
    showToast('Photo updated!');
  };
  r.readAsDataURL(input.files[0]);
}

function previewName(val) {
  const el = document.getElementById('profileNameEl');
  if(el) el.textContent = val;
}

function saveName() {
  const val = document.getElementById('editName')?.value.trim();
  if(val) {
    userName = val.toLowerCase();
    localStorage.setItem('hh_name', userName);
    document.getElementById('navUsername').textContent = userName;
    showToast('Profile saved!');
  }
}

function getUserPhoto(init) {
  return '';
}

function switchMode(m) {
  mode = m;
  document.getElementById('modeStu').classList.toggle('active', m==='student');
  document.getElementById('modeMen').classList.toggle('active', m==='mentor');
  showPage(currentPage, null);
  showToast(m==='student'?'Switched to Student view':'Switched to Mentor view');
}

function journeyClick(i) {
  const steps = ['dashboard','knowledge','knowledge','connect','work','work'];
  showPage(steps[i]||'dashboard', null);
  const tabs = document.querySelectorAll('.nav-tab');
  const map = {0:0,1:0,2:0,3:2,4:3,5:3};
  tabs.forEach(t=>t.classList.remove('active'));
  if(tabs[map[i]]) tabs[map[i]].classList.add('active');
}

function setAiLang(lang, btn) {
  aiLang = lang;
  document.getElementById('aiLtEn')?.classList.toggle('active', lang==='en');
  document.getElementById('aiLtSo')?.classList.toggle('active', lang==='so');
}

function sendAiMsg() {
  const input = document.getElementById('aiInput');
  const list = document.getElementById('aiMsgList');
  if(!input||!list||!input.value.trim()) return;
  const text = input.value.trim();
  input.value = '';

  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.innerHTML = `<div class="msg-av user-msg-av">${userName.substring(0,2).toUpperCase()}<img src="${userPhoto||''}" style="${userPhoto?'':'display:none'}"></div><div class="msg-bub">${text}</div>`;
  list.appendChild(userMsg);

  const typing = document.createElement('div');
  typing.className = 'msg ai';
  typing.innerHTML = `<div class="msg-av ai-msg-av">🤖</div><div class="msg-bub" style="color:var(--text-soft);font-style:italic">Thinking...</div>`;
  list.appendChild(typing);
  list.scrollTop = list.scrollHeight;

  setTimeout(()=>{
    typing.remove();
    const enResp = getEnglishResp(text);
    const soResp = getSomaliResp(text);
    const primaryResp = aiLang==='so' ? soResp : enResp;
    const secondaryResp = aiLang==='so' ? enResp : soResp;
    const secondaryLabel = aiLang==='so' ? '🇬🇧 English' : '🇸🇴 Af Soomaali';

    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg ai';
    aiMsg.innerHTML = `
      <div class="msg-av ai-msg-av">🤖</div>
      <div>
        <div class="msg-bub">${primaryResp}</div>
        <div class="msg-actions">
          <button class="msg-act-btn" onclick="showMsgTranslation(this,\`${secondaryResp.replace(/`/g,"'")}\`)">${secondaryLabel}</button>
        </div>
      </div>`;
    list.appendChild(aiMsg);
    list.scrollTop = list.scrollHeight;
  }, 1100);
}

function showMsgTranslation(btn, text) {
  const container = btn.closest('.msg');
  let ex = container.querySelector('.msg-translation');
  if(ex){ex.remove();return;}
  const div = document.createElement('div');
  div.className = 'msg-translation';
  div.innerHTML = `<div class="msg-translation-label">${btn.textContent}</div>${text}`;
  btn.closest('.msg-actions').insertAdjacentElement('afterend',div);
}

function setThreadLang(lang, btn, qid) {
  document.querySelectorAll('.abl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const body = document.getElementById('threadAiBody');
  if(!body) return;
  const q = questions.find(x=>x.id===qid)||questions[0];
  body.textContent = lang==='so' ? getSomaliResp(q.title) : getEnglishResp(q.title);
}

function translateAns(btn, qid) {
  const card = btn.closest('.answer-card');
  let ex = card.querySelector('.ans-translation');
  if(ex){ex.remove();return;}
  const q = questions.find(x=>x.id===qid)||questions[0];
  const div = document.createElement('div');
  div.className = 'ans-translation';
  div.style.cssText = 'margin-top:10px;padding:12px;background:var(--blue-light);border-radius:10px;border-left:3px solid var(--blue)';
  div.innerHTML = `<div style="font-size:9px;font-weight:700;color:var(--blue-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">🇸🇴 Af Soomaali</div><div style="font-size:13px;color:var(--blue-dark);line-height:1.6">${getSomaliResp(q.title)}</div>`;
  card.appendChild(div);
}

function addAiComment() {
  const inp = document.getElementById('threadAiCommInp');
  const list = document.getElementById('threadAiComments');
  if(!inp||!list||!inp.value.trim()) return;
  const div = document.createElement('div');
  div.className = 'ai-comm-item';
  div.innerHTML = `<div class="ai-comm-av" style="background:var(--blue)">${userName.substring(0,2).toUpperCase()}</div><div class="ai-comm-bubble"><div class="ai-comm-name">${userName}</div><div class="ai-comm-text">${inp.value}</div></div>`;
  list.appendChild(div);
  inp.value = '';
}

function addReply(inputId, listId) {
  const inp = document.getElementById(inputId);
  const list = document.getElementById(listId);
  if(!inp||!list||!inp.value.trim()) return;
  const div = document.createElement('div');
  div.className = 'white-comm-item';
  div.innerHTML = `<div class="white-comm-av">${userName.substring(0,2).toUpperCase()}</div><div class="white-comm-bubble"><div class="white-comm-name">${userName}</div><div class="white-comm-text">${inp.value}</div></div>`;
  list.appendChild(div);
  inp.value = '';
}

function toggleReply(btn) {
  const sec = btn.closest('.answer-card').querySelector('.reply-section');
  if(sec) sec.style.display = sec.style.display==='block'?'none':'block';
}

function openMentorModal(name) {
  document.getElementById('mentorModalTitle').textContent = `Request Mentorship — ${name}`;
  openModal('mentorModal');
}

function sendMentorRequest() {
  closeModal('mentorModal');
  showToast('Mentorship request sent!');
}

function toggleMobileMenu() {
  const m = document.getElementById('mobileMenuBar');
  m.style.display = m.style.display==='none'?'flex':'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── INIT ──
if(userPhoto) {
  const navImg = document.getElementById('navAvatarImg');
  if(navImg){navImg.src=userPhoto;navImg.style.display='block';}
}
document.getElementById('navUsername').textContent = userName;
document.getElementById('navAvatar').querySelector('span') && (document.getElementById('navAvatar').childNodes[0].textContent = userName.substring(0,2).toUpperCase());
showPage('dashboard', document.querySelector('.nav-tab'));
</script>
